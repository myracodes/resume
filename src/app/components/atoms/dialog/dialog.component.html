<app-button
    variant="ghost"
    type="button"
    (click)="showDialog()"
    ariaLabel="Ouvrir la modale de détails"
    buttonId="open-modal-button"
>{{ buttonLabel }}</app-button>
<p-dialog [(visible)]="isVisible">
    <ng-template pTemplate="header">
        <ng-content select="[dialog-header]"></ng-content>
    </ng-template>

    <ng-content></ng-content>

    <ng-template pTemplate="footer">
        <ng-content select="[dialog-footer]"></ng-content>
    </ng-template>
</p-dialog>
