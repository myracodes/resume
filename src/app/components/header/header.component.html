<div class="bg-container">
    <div class="parent">
        <div class="picture-container">
            <img
                src="assets/images/photo.webp"
                alt="portrait"
                class="picture" />
        </div>

        <div class="content">
            <h1 class="title">Myriam Mira</h1>

            <div class="items">
                <!-- LOCALISATION -->
                <span class="item">
                    <img src="assets/icons/map-pin.svg" class="icon" alt="" aria-hidden="true" />
                    <span>Basée en Île-de-France</span>
                </span>

                <!-- MOBILITE -->
                <span class="item">
                    <img src="assets/icons/bus.svg" class="icon" alt="" aria-hidden="true" />
                    <span>Permis B | vélo</span>
                </span>
                <!-- LINKEDIN -->
                <span class="item">
                    <img src="assets/icons/linkedin.svg" class="icon" alt="" aria-hidden="true" />
                    <app-external-link
                        [href]="'https://www.linkedin.com/in/myriam-mira/'"
                        >LinkedIn</app-external-link
                    >
                </span>

                <!-- GITHUB -->
                <span class="item">
                    <img src="assets/icons/github.svg" class="icon" alt="" aria-hidden="true" />
                    <app-external-link [href]="'https://github.com/myracodes'"
                        >GitHub</app-external-link
                    >
                </span>

                <!-- LANGUES -->
                <span class="item">
                    <img src="assets/icons/comments.svg" class="icon" alt="" aria-hidden="true" />
                    <span>Bilingue anglais / français</span>
                </span>

                <!-- DEV -->
                <span class="item">
                    <img src="assets/icons/code.svg" class="icon" alt="" aria-hidden="true" />
                    <span>Spécialité front-end</span>
                </span>
            </div>
        </div>
    </div>
    <app-rainbow-line></app-rainbow-line>
</div>
