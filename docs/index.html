<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <title>Myriam Mira — Développeuse front-end</title>
        <meta http-equiv="refresh" content="0; url=/resume/fr/" />
        <script>
            const lang = (navigator.language || "fr").toLowerCase().startsWith("en") ? "en" : "fr";
            window.location.replace("/resume/" + lang + "/");
        </script>
    </head>
    <body>
        <p><a href="/resume/fr/">Français</a> | <a href="/resume/en/">English</a></p>
    </body>
</html>
